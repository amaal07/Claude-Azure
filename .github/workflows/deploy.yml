name: Build & Deploy to Azure

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Infrastructure request (e.g. deploy resources, destroy resources)'
        required: false

env:
  APP_NAME: stock-predictor
  RESOURCE_GROUP: AmalRG

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.prompt == ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & push Docker image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}"
          LATEST="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:latest"
          docker build -t "$IMAGE" -t "$LATEST" ./app
          docker push "$IMAGE"
          docker push "$LATEST"

      - name: Deploy to Azure Container Instance
        run: |
          az container create \
            --name "${{ env.APP_NAME }}-container" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.APP_NAME }}:${{ github.sha }}" \
            --registry-login-server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --registry-username "${{ secrets.ACR_NAME }}" \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --dns-name-label "${{ env.APP_NAME }}-app" \
            --ports 8000 \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5 \
            --environment-variables \
              PAT_TOKEN="${{ secrets.PAT_TOKEN }}" \
              REPO_NAME="${{ secrets.REPO_NAME }}"

      - name: Print app URL
        run: |
          FQDN=$(az container show \
            --name "${{ env.APP_NAME }}-container" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query ipAddress.fqdn -o tsv)
          echo "Deployed to: http://$FQDN:8000"

  infra-agent:
    name: Run Infra Agent
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.prompt != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform -chdir=infra init

      - name: Create tfvars
        run: echo '${{ secrets.TF_VARS }}' > infra/terraform.tfvars

      - name: Run Infra Agent
        env:
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python scripts/infra_agent.py "${{ github.event.inputs.prompt }}"